<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Campingpark Kalletal - Ausflugsziele</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

  #header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
    color: white; padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #header h1 { font-size: 17px; font-weight: 700; }
  #header p { font-size: 12px; opacity: 0.85; margin-top: 1px; }

  #panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: white; border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    max-height: 70vh; display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  #panel.collapsed { transform: translateY(calc(100% - 54px - env(safe-area-inset-bottom))); }

  #panel-handle {
    display: flex; align-items: center; justify-content: center;
    padding: 10px 16px 6px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  #panel-handle .grip { width: 36px; height: 4px; border-radius: 2px; background: #ccc; }
  #panel-header {
    padding: 4px 16px 10px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #panel-header h2 { font-size: 15px; font-weight: 700; color: #222; }
  #panel-count { font-size: 12px; color: #999; }

  .filter-bar {
    padding: 0 16px 10px;
    display: flex; gap: 7px; flex-wrap: nowrap;
    overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 7px 14px; border-radius: 20px; border: 1.5px solid #ddd;
    background: white; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.2s; display: flex; align-items: center; gap: 5px;
    white-space: nowrap; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .filter-btn.active { border-color: transparent; color: white; }
  .filter-btn.active.cat-campingplatz { background: #e74c3c; }
  .filter-btn.active.cat-auto { background: #3498db; }
  .filter-btn.active.cat-natur { background: #27ae60; }
  .filter-btn.active.cat-shopping { background: #ab47bc; }
  .filter-btn.active.cat-supermarkt { background: #607d8b; }
  .filter-btn.active.cat-sonstiges { background: #f39c12; }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-campingplatz { background: #e74c3c; }
  .dot-auto { background: #3498db; }
  .dot-natur { background: #27ae60; }
  .dot-shopping { background: #ab47bc; }
  .dot-supermarkt { background: #607d8b; }
  .dot-sonstiges { background: #f39c12; }

  #poi-list { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; min-height: 0; }

  .poi-card {
    padding: 14px 16px; border-bottom: 1px solid #f0f0f0;
    cursor: pointer; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .poi-card:active { background: #f0f4ff; }
  .poi-card.highlighted { background: #eef6ff; border-left: 3px solid #3498db; }
  .poi-card h3 { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .poi-card .meta { font-size: 13px; color: #888; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .poi-card .desc { font-size: 13px; color: #555; line-height: 1.5; }
  .poi-card .tags { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: #f0f0f0; color: #666; font-weight: 500; }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 8px;
    white-space: nowrap;
  }
  .badge-rain { color: #2c5aa0; background: #eaf0fc; }
  .badge-bike { color: #1b7a3d; background: #e6f4ea; }
  .badge-fav { color: #b45309; background: #fef3c7; }

  .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; max-width: 260px; }
  .popup-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #222; }
  .popup-cat { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .popup-desc { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 8px; }
  .popup-info { font-size: 13px; color: #777; }
  .popup-badges { margin-top: 6px; margin-bottom: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  .popup-link {
    display: inline-block; margin-top: 8px; font-size: 13px;
    color: #3498db; text-decoration: none; font-weight: 600; padding: 6px 0;
  }
  .popup-nav {
    display: inline-block; margin-top: 4px; margin-left: 12px; font-size: 13px;
    color: #27ae60; text-decoration: none; font-weight: 600; padding: 6px 0;
  }

  .legend {
    background: white; padding: 8px 12px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 11px; line-height: 1.9;
  }
  .legend-title { font-weight: 700; margin-bottom: 2px; font-size: 12px; }
  .legend i {
    width: 10px; height: 10px; display: inline-block; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }

  @media (min-width: 769px) {
    #panel {
      left: 0; top: 0; bottom: 0; right: auto; width: 380px;
      border-radius: 0; max-height: 100vh; transform: none !important; padding-top: 64px;
    }
    #panel.collapsed { transform: none !important; }
    #panel-handle { display: none; }
    #map { left: 380px; }
    #header { left: 0; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>Campingpark Kalletal</h1>
  <p>Stemmer See &middot; Weserbergland, NRW</p>
</div>

<div id="map"></div>

<div id="panel" class="collapsed">
  <div id="panel-handle" onclick="togglePanel()"><div class="grip"></div></div>
  <div id="panel-header">
    <h2>Ausflugsziele</h2>
    <span id="panel-count"></span>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active cat-campingplatz" data-cat="campingplatz" onclick="toggleFilter(this)"><span class="dot dot-campingplatz"></span> Platz</button>
    <button class="filter-btn active cat-auto" data-cat="auto" onclick="toggleFilter(this)"><span class="dot dot-auto"></span> Auto</button>
    <button class="filter-btn active cat-shopping" data-cat="shopping" onclick="toggleFilter(this)"><span class="dot dot-shopping"></span> Shopping</button>
    <button class="filter-btn active cat-natur" data-cat="natur" onclick="toggleFilter(this)"><span class="dot dot-natur"></span> Natur</button>
    <button class="filter-btn active cat-supermarkt" data-cat="supermarkt" onclick="toggleFilter(this)"><span class="dot dot-supermarkt"></span> Einkauf</button>
    <button class="filter-btn active cat-sonstiges" data-cat="sonstiges" onclick="toggleFilter(this)"><span class="dot dot-sonstiges"></span> Sonstiges</button>
  </div>
  <div id="poi-list"></div>
</div>

<script>
const CAMPINGPLATZ = [52.1761, 8.9990];

const pois = [
  // === CAMPINGPLATZ ===

    tags: ["See", "Sandstrand", "Spielplätze", "Pirateninsel"],
    rain: true, bike: false, fav: false,

  // === AUTO-ZIELE ===

    tags: ["Natur", "Felsen", "Kinder"],
    rain: false, bike: false, fav: false,

  },
  {

    tags: ["Denkmal", "Aussicht", "Geschichte"],
    rain: false, bike: false, fav: false,
    url: "https://www.hermannsdenkmal.de/"
  },
  {
    name: "Vogelpark Heiligenkirchen",
    cat: "auto",
    lat: 51.9180, lng: 8.8550,
    dist: "~30 km (Detmold)",
    desc: "Am Fuß des Hermannsdenkmals. Bedrohte Vogelarten, superzahme Papageien zum Streicheln, Streichelzoo, großer Spielplatz. Perfekt für Kleinkinder!",
    tags: ["Tiere", "Streichelzoo", "Spielplatz", "Kinder"],
    rain: false, bike: false, fav: false,

  {

    desc: "Älteste und größte Greifvogelwarte Europas. 46 Arten, über 200 Vögel. Tägliche Freiflugvorführungen in der Saison. Beeindruckend auch für kleine Kinder!",
    tags: ["Greifvögel", "Flugshow", "Kinder"],

  {

    desc: "88 m hohes Denkmal auf dem Wittekindsberg. Grandioser Blick auf die Weser und die norddeutsche Tiefebene. Kostenlos! Kurzer Aufstieg, mit Kinderwagen machbar.",
    tags: ["Denkmal", "Aussicht", "Kostenlos"],
    rain: false, bike: false, fav: false,
    url: "https://www.portawestfalica.de/stadtleben/kultur-sehenswuerdigkeiten-wandern-sport/sehenswuerdigkeiten/kaiser-wilhelm-denkmal/"
  },
  {
    name: "Hameln (Rattenfängerstadt)",
    cat: "auto",
    lat: 52.1040, lng: 9.3570,
    dist: "~25 km",
    desc: "Prächtige Fachwerkaltstadt. Rattenfänger-Freilichtspiel sonntags (Mai-Sept, 12 Uhr). Toll zum Bummeln und Eis essen. Halber Tag.",
    tags: ["Altstadt", "Rattenfänger", "Fachwerk", "Kinder"],
    rain: false, bike: false, fav: false,
    url: "https://www.hameln.de/tourismus"
  },
  {
    name: "Dinopark Münchehagen",
    cat: "auto",
    lat: 52.3650, lng: 9.2100,
    dist: "~40 km",
    desc: "Deutschlands größter wissenschaftlicher Dino-Erlebnispark. Echte versteinerte Dinosaurier-Fährten! Lebensgroße Modelle, Mitmach-Museum. Kinder-Highlight.",
    tags: ["Dinos", "Kinder", "Mitmachen", "Ganzer Tag"],
    rain: false, bike: false, fav: false,
    url: "https://www.dinopark.de/"
  },
  {
    name: "Safariland Stukenbrock",
    cat: "auto",
    lat: 51.8890, lng: 8.6350,

    desc: "Safari-Park mit Wildtieren (Auto-Durchfahrt), Achterbahn, Streichelzoo. Der Safari-Teil geht auch mit Kleinen, der Freizeitpark eher für Ältere. Ganzer Tag.",
    tags: ["Safari", "Tiere", "Freizeitpark", "Ganzer Tag"],
    rain: false, bike: false, fav: false,
    url: "https://www.safariland-stukenbrock.de/"
  },

  // === SHOPPING & BUMMELN ===
  {
    name: "Rinteln Altstadt",
    cat: "shopping",
    lat: 52.1870, lng: 9.0800,
    dist: "~8 km",
    desc: "Historische Fachwerkaltstadt an der Weser. Prächtiges Weserrenaissance-Rathaus, gemütliche Fußgängerzone mit Cafés und kleinen Läden. Schön zum Bummeln!",

    url: "https://www.rinteln.de/"

  {

    url: "https://www.lemgo-marketing.de/"
  },
  {
    name: "Detmold Innenstadt",
    cat: "shopping",
    lat: 51.9370, lng: 8.8790,
    dist: "~28 km",
    desc: "Hübsche Residenzstadt mit Schloss, Landestheater und gemütlicher Fußgängerzone. Kleidung, Buchläden, Cafés.",
    tags: ["Schloss", "Fußgängerzone", "Cafés"],
    rain: true, bike: false, fav: false,
    url: "https://www.detmold.de/"
  },

  // === NATUR & RADTOUREN ===
  {
    name: "Weser-Radweg (Rinteln-Hameln)",
    cat: "natur",
    lat: 52.1550, lng: 9.1500,
    dist: "Entlang der Weser",
    desc: "Einer der beliebtesten Fernradwege Deutschlands. Abschnitt Rinteln bis Hameln (~25 km einfach) ist besonders schön, flach und familienfreundlich. Direkt an der Weser entlang.",
    tags: ["Radweg", "Weser", "Flach", "Familienfreundlich"],
    rain: false, bike: true, fav: false,
  },
  {
    name: "Stemmer See Rundweg",
    cat: "natur",
    lat: 52.1750, lng: 8.9970,
    dist: "~3 km / direkt am Platz",
    desc: "Gemütliche Runde um den See. Flach, schattig, perfekt für einen Abendspaziergang oder eine kurze Radrunde mit den Kindern.",
    tags: ["See", "Kurz", "Abendspaziergang"],
    rain: false, bike: true, fav: false,
  },

  // === SUPERMÄRKTE ===
  {
    name: "EDEKA Röthemeier Kalletal",
    cat: "supermarkt",
    lat: 52.1560, lng: 8.9540,
    dist: "~3 km",
    desc: "Gut sortierter EDEKA an der Lemgoer Str. 28. Obst, Gemüse, Fleisch, ferdinands Bäckerei mit frischen Brötchen und Kaffee.",
    tags: ["Nah!", "3 km", "Bäckerei"],
    rain: true, bike: true, fav: false,
  },
  {
    name: "EDEKA Camen Stemmen",
    cat: "supermarkt",
    lat: 52.1780, lng: 9.0050,
    dist: "~2 km",
    desc: "Kleiner EDEKA direkt in Stemmen an der Weserstraße. Für den schnellen Einkauf.",
    tags: ["Sehr nah!", "2 km"],
    rain: true, bike: true, fav: false,
  },
  {
    name: "Supermärkte Rinteln",
    cat: "supermarkt",
    lat: 52.1870, lng: 9.0750,
    dist: "~8 km",
    desc: "Große Auswahl in Rinteln: EDEKA, Aldi, Lidl, REWE. Für den größeren Wocheneinkauf.",
    tags: ["Große Auswahl", "8 km"],
    rain: true, bike: false, fav: false,
  },
  {
    name: "Supermärkte Lemgo",
    cat: "supermarkt",
    lat: 52.0280, lng: 8.9050,
    dist: "~18 km",
    desc: "REWE (Entruper Weg 63), Marktkauf (Grevenmarschstr. 4-12). Große Märkte mit breitem Sortiment.",
    tags: ["REWE", "Marktkauf", "18 km"],
    rain: true, bike: false, fav: false,
  },

  // === SONSTIGES ===
  {
    name: "Wasserskianlage Kalletal",
    cat: "sonstiges",
    lat: 52.1770, lng: 9.0010,
    dist: "Direkt nebenan",
    desc: "Wasserski und Wakeboard per Seilbahnanlage auf dem Stemmer See. Zuschauen ist auch für Kinder spannend! Kurse für Anfänger verfügbar.",
    tags: ["Wasserski", "Zuschauen", "Action"],
    rain: false, bike: true, fav: false,
  }
];

const colorMap = {
  campingplatz: '#e74c3c',
  auto: '#3498db',
  natur: '#27ae60',
  shopping: '#ab47bc',
  supermarkt: '#607d8b',
  sonstiges: '#f39c12'
};
const catLabels = {
  campingplatz: 'Campingplatz',
  auto: 'Mit dem Auto',
  natur: 'Natur & Radtouren',
  shopping: 'Shopping & Bummeln',
  supermarkt: 'Supermarkt',
  sonstiges: 'Sonstiges'
};

const activeFilters = new Set(Object.keys(colorMap));
let markers = {};
let map;
let panelOpen = false;

function isMobile() { return window.innerWidth < 769; }

function togglePanel() {
  const panel = document.getElementById('panel');
  panelOpen = !panelOpen;
  panel.classList.toggle('collapsed', !panelOpen);
  setTimeout(() => map.invalidateSize(), 400);
}

function createIcon(cat) {
  const color = colorMap[cat];
  if (cat === 'campingplatz') {
    return L.divIcon({ className: '',
      html: `<div style="width:22px;height:22px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:11px;font-weight:bold;">&#9978;</span></div>`,
      iconSize: [22, 22], iconAnchor: [11, 11]
    });
  }
  if (cat === 'supermarkt') {
    return L.divIcon({ className: '',
      html: `<div style="width:18px;height:18px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:10px;">&#128722;</span></div>`,
      iconSize: [18, 18], iconAnchor: [9, 9]
    });
  }
  if (cat === 'shopping') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:11px;">&#128092;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  if (cat === 'natur') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:11px;">&#127795;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  return L.divIcon({ className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

function navLink(lat, lng) {
  return `<a class="popup-nav" href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving" target="_blank">Navigation &#8599;</a>`;
}

function badges(poi) {
  let html = '';
  if (poi.fav || poi.rain || poi.bike) {
    html += '<div class="popup-badges">';
    if (poi.fav) html += '<span class="badge badge-fav">&#11088; Andreas\' Tipp</span>';
    if (poi.bike) html += '<span class="badge badge-bike">&#128690; Mit dem Rad erreichbar</span>';
    if (poi.rain) html += '<span class="badge badge-rain">&#9730; Schlechtwetter ok</span>';
    html += '</div>';
  }
  return html;
}

function badgesInline(poi) {
  let html = '';
  if (poi.fav) html += '<span class="badge badge-fav">&#11088; Tipp</span>';
  if (poi.bike) html += '<span class="badge badge-bike">&#128690; Rad</span>';
  if (poi.rain) html += '<span class="badge badge-rain">&#9730; Regen ok</span>';
  return html;
}

function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: true }).setView(CAMPINGPLATZ, 10);
  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OSM', maxZoom: 18
  }).addTo(map);

  L.circle(CAMPINGPLATZ, { radius: 15000, color: '#27ae60', fillColor: '#27ae60', fillOpacity: 0.06, weight: 1.5, dashArray: '6,4' }).addTo(map);
  L.circle(CAMPINGPLATZ, { radius: 40000, color: '#3498db', fillColor: '#3498db', fillOpacity: 0.04, weight: 1.5, dashArray: '6,4' }).addTo(map);

  pois.forEach((poi, i) => {
    const marker = L.marker([poi.lat, poi.lng], { icon: createIcon(poi.cat) }).addTo(map);
    const popupHtml = `
      <div class="popup-cat" style="color:${colorMap[poi.cat]}">${catLabels[poi.cat]}</div>
      <div class="popup-title">${poi.name}</div>
      ${badges(poi)}
      <div class="popup-desc">${poi.desc}</div>
      <div class="popup-info">${poi.dist}</div>
      <div>
        ${poi.url ? `<a class="popup-link" href="${poi.url}" target="_blank">Website &rarr;</a>` : ''}
        ${poi.cat !== 'campingplatz' ? navLink(poi.lat, poi.lng) : ''}
      </div>
    `;
    marker.bindPopup(popupHtml, { maxWidth: 260, autoPanPadding: [20, 80] });
    marker.on('click', () => {
      if (isMobile() && panelOpen) togglePanel();
    });
    markers[i] = marker;
  });

  if (!isMobile()) {
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <div class="legend-title">Legende</div>
        <div><i style="background:#e74c3c"></i> Campingplatz</div>
        <div><i style="background:#3498db"></i> Auto-Ausflug</div>
        <div><i style="background:#ab47bc"></i> Shopping & Bummeln</div>
        <div><i style="background:#27ae60"></i> Natur & Radtouren</div>
        <div><i style="background:#607d8b"></i> Supermarkt</div>
        <div><i style="background:#f39c12"></i> Sonstiges</div>
        <div style="margin-top:4px;">
          <span class="badge badge-fav" style="font-size:10px;">&#11088; Tipp</span>
          <span class="badge badge-bike" style="font-size:10px;">&#128690; Rad</span>
          <span class="badge badge-rain" style="font-size:10px;">&#9730; Regen ok</span>
        </div>
      `;
      return div;
    };
    legend.addTo(map);
  }

  if (isMobile()) map.panBy([0, -40]);
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('poi-list');
  list.innerHTML = '';
  let count = 0;

  pois.forEach((poi, i) => {
    if (!activeFilters.has(poi.cat)) {
      if (markers[i]) markers[i].remove();
      return;
    }
    if (markers[i] && !map.hasLayer(markers[i])) markers[i].addTo(map);
    count++;

    const card = document.createElement('div');
    card.className = 'poi-card';
    card.innerHTML = `
      <h3>
        <span class="dot dot-${poi.cat}"></span>
        ${poi.name}
      </h3>
      <div class="meta">
        ${poi.dist}
        ${badgesInline(poi)}
      </div>
      <div class="desc">${poi.desc}</div>
      ${poi.tags ? `<div class="tags">${poi.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
    `;
    card.addEventListener('click', () => {
      if (isMobile() && panelOpen) togglePanel();
      setTimeout(() => {
        map.flyTo([poi.lat, poi.lng], 13, { duration: 0.6 });
        markers[i].openPopup();
      }, isMobile() ? 400 : 0);
      document.querySelectorAll('.poi-card').forEach(c => c.classList.remove('highlighted'));
      card.classList.add('highlighted');
    });
    list.appendChild(card);
  });

  document.getElementById('panel-count').textContent = count + ' Ziele';
}

function toggleFilter(btn) {
  const cat = btn.dataset.cat;
  if (activeFilters.has(cat)) {
    activeFilters.delete(cat);
    btn.classList.remove('active');
  } else {
    activeFilters.add(cat);
    btn.classList.add('active');
  }
  renderSidebar();
}

let touchStartY = 0;
document.addEventListener('DOMContentLoaded', () => {
  const panelEl = document.getElementById('panel');
  panelEl.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  panelEl.addEventListener('touchend', (e) => {
    const diff = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(diff) > 40) {
      if (diff < 0 && !panelOpen) togglePanel();
      if (diff > 0 && panelOpen) togglePanel();
    }
  }, { passive: true });
});

initMap();
</script>
</body>
</html>
