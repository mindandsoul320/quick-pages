    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    max-height: 70vh; display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  #panel.collapsed { transform: translateY(calc(100% - 54px - env(safe-area-inset-bottom))); }

  #panel-handle {
    display: flex; align-items: center; justify-content: center;
    padding: 10px 16px 6px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  #panel-handle .grip { width: 36px; height: 4px; border-radius: 2px; background: #ccc; }
  #panel-header {

  #panel-count { font-size: 12px; color: #999; }

    display: flex; gap: 7px; flex-wrap: nowrap;
    overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 7px 14px; border-radius: 20px; border: 1.5px solid #ddd;

  .filter-btn.active.cat-shopping { background: #ab47bc; }
  .filter-btn.active.cat-flugplatz { background: #8e44ad; }
  .filter-btn.active.cat-sonstiges { background: #f39c12; }

  .dot-campingplatz { background: #e74c3c; }
  .dot-auto { background: #3498db; }
  .dot-natur { background: #27ae60; }
  .dot-spielplatz { background: #ff7043; }
  .dot-hafen { background: #0097a7; }

const colorMap = {
  campingplatz: '#e74c3c',
  auto: '#3498db',
  natur: '#27ae60',
  spielplatz: '#ff7043',
  hafen: '#0097a7',
  eiscafe: '#e91e63',
  supermarkt: '#607d8b',
  strand: '#00acc1',
  shopping: '#ab47bc',
  flugplatz: '#8e44ad',
  sonstiges: '#f39c12'
};
const catLabels = {
  campingplatz: 'Campingplatz',
  auto: 'Mit dem Auto',
  natur: 'Natur & Radtouren',
  spielplatz: 'Spielplatz',
  hafen: 'Hafen & Promenade',
  eiscafe: 'Eiscafé',
  supermarkt: 'Supermarkt',
  strand: 'Strand & Meer',
  shopping: 'Shopping & Bummeln',
  flugplatz: 'Flugplatz',
  sonstiges: 'Sonstiges'
};

const activeFilters = new Set(Object.keys(colorMap));
let markers = {};
let map;
let panelOpen = false;

function isMobile() { return window.innerWidth < 769; }

function togglePanel() {
  const panel = document.getElementById('panel');
  panelOpen = !panelOpen;
  panel.classList.toggle('collapsed', !panelOpen);
  setTimeout(() => map.invalidateSize(), 400);
}

function createIcon(cat) {
  const color = colorMap[cat];
  if (cat === 'campingplatz') {
    return L.divIcon({ className: '',
      html: `<div style="width:22px;height:22px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:11px;font-weight:bold;">&#9978;</span></div>`,
      iconSize: [22, 22], iconAnchor: [11, 11]
    });
  }
  if (cat === 'spielplatz') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:12px;">&#9881;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  if (cat === 'hafen') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:11px;">&#9875;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  if (cat === 'supermarkt') {
    return L.divIcon({ className: '',
      html: `<div style="width:18px;height:18px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:10px;">&#128722;</span></div>`,
      iconSize: [18, 18], iconAnchor: [9, 9]
    });
  }
  if (cat === 'eiscafe') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:11px;">&#127846;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  if (cat === 'flugplatz') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:12px;">&#9992;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  if (cat === 'strand') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:12px;">&#127958;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  if (cat === 'shopping') {
    return L.divIcon({ className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><span style="color:white;font-size:11px;">&#128092;</span></div>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
  }
  return L.divIcon({ className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

function navLink(lat, lng) {
  return `<a class="popup-nav" href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving" target="_blank">Navigation &#8599;</a>`;
}

function badges(poi) {
  let html = '';
  if (poi.fav || poi.rain || poi.bike) {
    html += '<div class="popup-badges">';
    if (poi.fav) html += '<span class="badge badge-fav">&#11088; Andreas\' Tipp</span>';
    if (poi.bike) html += '<span class="badge badge-bike">&#128690; Mit dem Rad erreichbar</span>';
    if (poi.rain) html += '<span class="badge badge-rain">&#9730; Schlechtwetter ok</span>';
    html += '</div>';
  }
  return html;
}

function badgesInline(poi) {
  let html = '';
  if (poi.fav) html += '<span class="badge badge-fav">&#11088; Tipp</span>';
  if (poi.bike) html += '<span class="badge badge-bike">&#128690; Rad</span>';
  if (poi.rain) html += '<span class="badge badge-rain">&#9730; Regen ok</span>';
  return html;
}

function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: true }).setView(CAMPINGPLATZ, 11);
  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OSM', maxZoom: 18
  }).addTo(map);

  L.circle(CAMPINGPLATZ, { radius: 15000, color: '#27ae60', fillColor: '#27ae60', fillOpacity: 0.06, weight: 1.5, dashArray: '6,4' }).addTo(map);
  L.circle(CAMPINGPLATZ, { radius: 40000, color: '#3498db', fillColor: '#3498db', fillOpacity: 0.04, weight: 1.5, dashArray: '6,4' }).addTo(map);

  pois.forEach((poi, i) => {
    const marker = L.marker([poi.lat, poi.lng], { icon: createIcon(poi.cat) }).addTo(map);
    const popupHtml = `
      <div class="popup-cat" style="color:${colorMap[poi.cat]}">${catLabels[poi.cat]}</div>
      <div class="popup-title">${poi.name}</div>
      ${badges(poi)}
      <div class="popup-desc">${poi.desc}</div>
      <div class="popup-info">${poi.dist}</div>
      <div>
        ${poi.url ? `<a class="popup-link" href="${poi.url}" target="_blank">Website &rarr;</a>` : ''}
        ${poi.cat !== 'campingplatz' ? navLink(poi.lat, poi.lng) : ''}
      </div>
    `;
    marker.bindPopup(popupHtml, { maxWidth: 260, autoPanPadding: [20, 80] });
    marker.on('click', () => {
      if (isMobile() && panelOpen) togglePanel();
    });
    markers[i] = marker;
  });

  if (!isMobile()) {
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <div class="legend-title">Legende</div>
        <div><i style="background:#e74c3c"></i> Campingplatz</div>
        <div><i style="background:#3498db"></i> Auto-Ausflug</div>
        <div><i style="background:#00acc1"></i> Strand & Meer</div>
        <div><i style="background:#ab47bc"></i> Shopping & Bummeln</div>
        <div><i style="background:#27ae60"></i> Natur & Radtouren</div>
        <div><i style="background:#ff7043"></i> Spielplatz</div>
        <div><i style="background:#0097a7"></i> Hafen & Promenade</div>
        <div><i style="background:#e91e63"></i> Eiscafé</div>
        <div><i style="background:#607d8b"></i> Supermarkt</div>
        <div><i style="background:#8e44ad"></i> Flugplatz</div>
        <div><i style="background:#f39c12"></i> Sonstiges</div>
        <div style="margin-top:4px;">
          <span class="badge badge-fav" style="font-size:10px;">&#11088; Tipp</span>
          <span class="badge badge-bike" style="font-size:10px;">&#128690; Rad</span>
          <span class="badge badge-rain" style="font-size:10px;">&#9730; Regen ok</span>
        </div>
      `;
      return div;
    };
    legend.addTo(map);
  }

  if (isMobile()) map.panBy([0, -40]);
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('poi-list');
  list.innerHTML = '';
  let count = 0;

  pois.forEach((poi, i) => {
    if (!activeFilters.has(poi.cat)) {
      if (markers[i]) markers[i].remove();
      return;
    }
    if (markers[i] && !map.hasLayer(markers[i])) markers[i].addTo(map);
    count++;

    const card = document.createElement('div');
    card.className = 'poi-card';
    card.innerHTML = `
      <h3>
        <span class="dot dot-${poi.cat}"></span>
        ${poi.name}
      </h3>
      <div class="meta">
        ${poi.dist}
        ${badgesInline(poi)}
      </div>
      <div class="desc">${poi.desc}</div>
      ${poi.tags ? `<div class="tags">${poi.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
    `;
    card.addEventListener('click', () => {
      if (isMobile() && panelOpen) togglePanel();
      setTimeout(() => {
        map.flyTo([poi.lat, poi.lng], poi.cat === 'sonstiges' ? 9 : 13, { duration: 0.6 });
        markers[i].openPopup();
      }, isMobile() ? 400 : 0);
      document.querySelectorAll('.poi-card').forEach(c => c.classList.remove('highlighted'));
      card.classList.add('highlighted');
    });
    list.appendChild(card);
  });

  document.getElementById('panel-count').textContent = count + ' Ziele';
}

function toggleFilter(btn) {
  const cat = btn.dataset.cat;
  if (activeFilters.has(cat)) {
    activeFilters.delete(cat);
    btn.classList.remove('active');
  } else {
    activeFilters.add(cat);
    btn.classList.add('active');
  }
  renderSidebar();
}

let touchStartY = 0;
document.addEventListener('DOMContentLoaded', () => {
  const panelEl = document.getElementById('panel');
  panelEl.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  panelEl.addEventListener('touchend', (e) => {
    const diff = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(diff) > 40) {
      if (diff < 0 && !panelOpen) togglePanel();
      if (diff > 0 && panelOpen) togglePanel();
    }
  }, { passive: true });
});

initMap();
</script>
